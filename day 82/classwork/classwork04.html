<!-- 5) შექმენი ბარათი, რომელიც hover-ზე ოდნავ აიწევს ზემოთ და დაემატება ჩრდილი. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{height: 100vh;}
        div{
            cursor: pointer;
            width: 100px;
            height: 50px;
            background-color: red;
            transition: 0.5s;
            position: relative;
            left: 50%;
            top: 50%
        }
        div:hover{
            transform: translateY(-50px);
            box-shadow: 0 0 10px black;
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
