<!-- 4) გააკეთე წრე, რომელიც hover-ზე ოდნავ გაიზრდება ზომაში (transform: scale() გამოიყენე). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{height: 100vh;}
        div{
            width: 50px;
            height: 50px;
            background-color: red;
            position: relative;
            top: 50%;
            left: 50%;
            transition: 0.5s;
            border-radius: 50%;
        }
        div:hover{
            transform: scale(1.5);
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
