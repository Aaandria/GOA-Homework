<!-- 3) შექმენი კვადრატი, რომელიც hover-ზე 20px-ით მარჯვნივ გადაიწევს (transform: translateX() გამოიყენე). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            cursor: pointer;
            width: 50px;
            height: 50px;
            background-color: red;
            transition: 0.5s;
        }
        div:hover{
            transform: translateX(50px);
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
