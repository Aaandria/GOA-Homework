<!-- 1)  შექმენი ბარათი, რომელიც hover-ზე გაიზრდება, ოდნავ აიწევს ზემოთ და ნელა დატრიალდება 5 გრადუსით. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 50px;
            height: 50px;
            background-color: red;
            margin-top:50px;
            transition: 0.5s ease;
        }
        .box:hover{
            transform: translateY(-25px) rotate(5deg);
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
