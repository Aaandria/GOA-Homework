<!-- 12) გააკეთე ღილაკი, რომელსაც hover-ზე შიგნით მოძრავი ფონური ეფექტი ექნება (ფონის ბლოკი transform-ით გადაადგილდეს). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .button {
            position: relative;
            padding: 15px 40px;
            font-size: 18px;
            border: 2px solid blue;
            background: transparent;
            color: blue;
            cursor: pointer;
            overflow: hidden;
            transition: color 0.3s ease;
        }   
        .button::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: blue;
            transform: translateX(0);
            transition: transform 0.4s ease;
            z-index: 0;
        }
        .button span {
            position: relative;
            z-index: 1;
        }
        .button:hover::before {
            transform: translateX(100%);
        }
        .button:hover {
        color: white;
        }
    </style>
</head>
<body>
    <button class="button">
        <span>Hover Me</span>
    </button>
</body>
</html>
