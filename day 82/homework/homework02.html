<!-- 3) შექმენი ღილაკი, რომლის შიგნით არსებული ტექსტი hover-ზე მარჯვნივ გადაიწევს, ხოლო ღილაკის ფონიც შეიცვლება. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            width: 100px;
            height: 20px;
            background-color: aqua;
            border: none;
            transition: 0.5s ease;
        }
        button:hover{
            text-align: end ;
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <button>:hover me</button>
</body>
</html>
