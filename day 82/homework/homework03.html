<!-- 4) გააკეთე ბარათი, რომელიც hover-ზე გადაიხრება 3D ეფექტით (rotateX ან rotateY). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card-container {
            perspective: 1000px;
        }

        .card {
            width: 300px;
            height: 200px;
            background: red;
            color: white;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.6s ease;
            transform-style: preserve-3d; 
        }
        .card:hover {
            transform: rotateY(20deg) rotateX(10deg);
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="card">
            3D ბარათი
        </div>
    </div>
</body>
</html>
