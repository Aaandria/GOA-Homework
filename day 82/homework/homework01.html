<!-- 2) გააკეთე სურათი, რომელიც hover-ზე გადიდდება და ცენტრიდან გაიზრდება ისე, რომ კონტეინერს არ გაცდეს. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .border{
            width: 100px;
            height: 100px;
            border: solid 5px brown;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .box{
            width: 50px;
            height: 50px;
            background-color: red;
            transition: 0.5s ease;
        }
        .box:hover{
            transform: scale(2);
        }
    </style>
</head>
<body>
    <div class="border">
        <div class="box"></div>
    </div>
    
</body>
</html>
