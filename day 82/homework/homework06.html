<!-- 7) შექმენი ღილაკი, რომელსაც hover-ზე გამოუჩნდება ქვედა ხაზის ანიმაცია (ხაზი transform-ით გაიზარდოს). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .button {
            position: relative;
            background: none;
            border: none;
            cursor: pointer;
        }
        .button::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 3px;
            background-color: red;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }
        .button:hover::after {
            transform: scaleX(1);
        }
    </style>
</head>
<body>
    <button class="button">Hover Me</button>
</body>
</html>
