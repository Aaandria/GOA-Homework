<!-- 11) შექმენი სურათი, რომელსაც hover-ზე ექნება zoom + მცირე rotate ეფექტი ერთდროულად. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            background-color: red;
            margin-top:50px;
            margin-left:50px;
            transition: 1s ease;
        }
        .box:hover{
            transform: scale(1.5) rotate(360deg);
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
