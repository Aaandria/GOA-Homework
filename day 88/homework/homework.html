<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <p class="text-center text-xl">homework 1</p>
    <!-- 1) შექმენი 8 ბარათის სექცია grid-ით.
        Mobile-ზე 1 სვეტი
        md-ზე 2 სვეტი
        lg-ზე 3 სვეტი
        xl-ზე 4 სვეტი
        2xl-ზე 5 სვეტი
        ბარათებს დაუმატე shadow-lg, rounded-2xl, p-6, transition.
        Hover-ზე ბარათი ოდნავ გაიზარდოს (hover:scale-105) და ჩრდილი გაძლიერდეს.
        დამატებითი პირობა: პირველი ბარათი ყოველთვის 2 სვეტს იკავებდეს (col-span-2) lg ზომიდან ზემოთ. -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6 mb-5">
        <div class="bg-gray-300 h-40 rounded-2xl shadow-lg p-6 transition transform lg:col-span-2
         hover:scale-105 hover:shadow-2xl">Card 1</div>
        <div class="bg-gray-300 h-40 rounded-2xl shadow-lg p-6 transition transform hover:scale-105 hover:shadow-2xl">Card 2</div>
        <div class="bg-gray-300 h-40 rounded-2xl shadow-lg p-6 transition transform hover:scale-105 hover:shadow-2xl">Card 3</div>
        <div class="bg-gray-300 h-40 rounded-2xl shadow-lg p-6 transition transform hover:scale-105 hover:shadow-2xl">Card 4</div>
        <div class="bg-gray-300 h-40 rounded-2xl shadow-lg p-6 transition transform hover:scale-105 hover:shadow-2xl">Card 5</div>
        <div class="bg-gray-300 h-40 rounded-2xl shadow-lg p-6 transition transform hover:scale-105 hover:shadow-2xl">Card 6</div>
        <div class="bg-gray-300 h-40 rounded-2xl shadow-lg p-6 transition transform hover:scale-105 hover:shadow-2xl">Card 7</div>
        <div class="bg-gray-300 h-40 rounded-2xl shadow-lg p-6 transition transform hover:scale-105 hover:shadow-2xl">Card 8</div>
    </div>
    <p class="text-center text-xl">homework 2</p>
    <!-- 2) შექმენი მრგვალი ღილაკი, რომელსაც აქვს animate-bounce, მაგრამ:
        მხოლოდ mobile და md ზომაზე მუშაობდეს
        lg-დან ზემოთ animation შეწყდეს
        Hover-ზე შეიცვალოს ფონი და ტექსტის ფერი.
        დამატებითი პირობა: focus-ზე დაემატოს ring ეფექტი (focus:ring-4) და animation შეწყდეს focus დროს. -->
    <button class="animate-bounce lg:animate-none hover:bg-blue-500 hover:text-white focus:ring-4
     focus:ring-blue-300 w-16 h-16 rounded-full bg-red-500 mx-auto">Click</button>
    <p class="text-center text-xl">homework 3</p>
    <!-- 3) შექმენი loader 5 ელემენტით (flex gap-3).
        ყველას ჰქონდეს animate-pulse, მაგრამ განსხვავებული delay (გამოიყენე arbitrary value: [animation-delay:200ms] და ა.შ.).
        ზომები იყოს განსხვავებული (w-2 h-2 ... w-6 h-6).
        Loader იყოს ვერტიკალურად და ჰორიზონტალურად ცენტრში.
        დამატებითი პირობა: dark mode-ზე ფერი შეიცვალოს (dark:bg-white). -->
    <div class="flex gap-3 justify-center items-center h-screen">
        <div class="w-2 h-2 bg-gray-500 rounded-full animate-pulse [animation-delay:200ms]"></div>
        <div class="w-3 h-3 bg-gray-500 rounded-full animate-pulse [animation-delay:400ms]"></div>
        <div class="w-4 h-4 bg-gray-500 rounded-full animate-pulse [animation-delay:600ms]"></div>
        <div class="w-5 h-5 bg-gray-500 rounded-full animate-pulse [animation-delay:800ms]"></div>
        <div class="w-6 h-6 bg-gray-500 rounded-full animate-pulse [animation-delay:1000ms]"></div>
    </div>
    <!-- 5) შექმენი advanced card hover ეფექტით:
        transform
        rotate-2
        scale-105
        hover:-translate-y-3
        transition duration-500 ease-in-out
        Hover-ზე card-ის შიგნით არსებული ღილაკი გამოჩნდეს (opacity-0 → opacity-100).
        დამატებითი პირობა: გამოიყენე group და group-hover. -->
    <p class="text-center text-xl">homework 5</p>
    <div class="bg-white w-64 h-40 rounded-2xl shadow-lg p-6 transition duration-500 
        ease-in-out transform hover:-translate-y-3 hover:rotate-2 hover:scale-105 group relative">
        <h2 class="text-xl font-bold mb-2">Card Title</h2>
        <p class="text-gray-600">This is a card with an advanced hover effect.</p>
        <button class="absolute bottom-4 left-1/2 transform -translate-x-1/2 bg-blue-500 
            text-white px-4 py-2 rounded opacity-0 group-hover:opacity-100 transition-opacity duration-300">Learn More</button>
    </div>
</body>
</html>
