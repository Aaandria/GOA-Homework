<!-- 6) შექმენი div და გამოიყენე clip-path: polygon() რომ სამკუთხედი გახდეს. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 100px;
            height: 100px;
            background-color: red;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100% );
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
