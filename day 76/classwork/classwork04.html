<!-- 5) შექმენი სურათი და გამოიყენე clip-path: circle() რომ მრგვალი ჩარჩოში ჩასვა. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 100px;
            height: 100px;
            background-color: red;
            clip-path: circle(50%);
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
