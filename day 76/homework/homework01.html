<!-- 2)CSS ცვლადები – ფერი და კიდეები
პირობა:
შექმენით ორი ყუთი (div) ზომით 150px x 150px.
შექმენით ცვლადები:
--main-color – ყუთის ფონისთვის
--border-radius – ყუთის კიდეებისთვის
გამოიყენეთ ცვლადები ორივე ყუთზე, ისე რომ მათი ფერი ან კიდეები მარტივად შეიცვალოს ცვლადის შეცვლით. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root{
            --main-color: red;
            --border-color: black;
        }
        div{
            width: 150px;
            height: 150px;
            background-color: var(--main-color);
            border: solid 5px var(--border-color);
        }
    </style>
</head>
<body>
    <div></div>
    <div></div>
</body>
</html>
