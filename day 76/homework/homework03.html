<!-- 4) შერეული – მრავალკუთხა + ცვლადი
პირობა:
შექმენით ყუთი (div) ზომით 250px x 250px.
გამოიყენეთ ცვლადი --main-color ფონისთვის
გამოიყენეთ clip-path, რომ ყუთი იყოს მრავალკუთხა (polygon) ფორმის
ცვლადის შეცვლისას ყუთის ფერი ავტომატურად შეიცვლება -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root{
            --main-color: red;
        }

        div{
            width: 250px;
            height: 250px;
            background-color: var(--main-color);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
