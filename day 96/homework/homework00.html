


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Form with TailwindCSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6', // blue-500
                        secondary: '#6b7280', // gray-500
                        error: '#ef4444', // red-500
                        success: '#10b981', // emerald-500
                    },
                },
            },
        }
  </script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md p-6 bg-white rounded-xl shadow-lg">
        <form id="advancedForm" class="space-y-6" novalidate>
            <div class="relative group">
                <input id="name" name="name" type="text" required
                    class="peer h-11 w-full border-b-2 border-slate-300 bg-transparent px-0 text-gray-900
                    placeholder-transparent focus:outline-none focus:border-primary
                    invalid:border-error valid:border-success transition-colors"
                    placeholder="Name"/>
                <label for="name"
                    class="absolute left-0 -top-1.5 text-secondary text-sm transition-all peer-placeholder-shown:top-3
                    peer-placeholder-shown:text-base peer-placeholder-shown:text-secondary peer-focus:-top-1.5
                    peer-focus:text-sm peer-focus:text-primary peer-valid:text-success peer-invalid:text-error">
                    Name
                </label>
                <span class="absolute right-0 top-2 z-10 rounded bg-gray-800 text-white px-2 py-1 text-xs
                opacity-0 invisible transition-all duration-200 group-hover:opacity-100 group-hover:visible
                group-focus-within:opacity-100 group-focus-within:visible">
                    Use your full name
                </span>
                <span class="text-error text-sm mt-1 block" id="nameError" style="display: none;">Name is required</span>
            </div>

            <!-- Email Field -->
            <div class="relative group">
                <input id="email" name="email" type="email" required
                    class="peer h-11 w-full border-b-2 border-slate-300 bg-transparent px-0 text-gray-900
                    placeholder-transparent focus:outline-none focus:border-primary
                    invalid:border-error valid:border-success transition-colors"
                    placeholder="Email" />
                <label for="email"
                    class="absolute left-0 -top-1.5 text-secondary text-sm transition-all peer-placeholder-shown:top-3
                    peer-placeholder-shown:text-base peer-placeholder-shown:text-secondary peer-focus:-top-1.5
                    peer-focus:text-sm peer-focus:text-primary peer-valid:text-success peer-invalid:text-error">
                    Email
                </label>
                <span class="absolute right-0 top-2 z-10 rounded bg-gray-800 text-white px-2 py-1 text-xs
                opacity-0 invisible transition-all duration-200 group-hover:opacity-100 group-hover:visible
                group-focus-within:opacity-100 group-focus-within:visible">
                    Format: name@example.com
                </span>
                <span class="text-error text-sm mt-1 block" id="emailError" style="display: none;">Please enter a valid email</span>
            </div>

            <!-- Password Field -->
            <div class="relative group">
                <input id="password" name="password" type="password" required minlength="6"
                    class="peer h-11 w-full border-b-2 border-slate-300 bg-transparent px-0 pr-8 text-gray-900
                    placeholder-transparent focus:outline-none focus:border-primary
                    invalid:border-error valid:border-success transition-colors"
                    placeholder="Password" />
                <label for="password"
                    class="absolute left-0 -top-1.5 text-secondary text-sm transition-all peer-placeholder-shown:top-3
                    peer-placeholder-shown:text-base peer-placeholder-shown:text-secondary peer-focus:-top-1.5
                    peer-focus:text-sm peer-focus:text-primary peer-valid:text-success peer-invalid:text-error">
                    Password
                </label>
                <button type="button" id="togglePassword" class="absolute right-0 top-3 text-gray-400 hover:text-gray-600">
                    <i data-lucide="eye" class="w-5 h-5"></i>
                </button>
                <span class="absolute right-8 top-2 z-10 rounded bg-gray-800 text-white px-2 py-1 text-xs
                opacity-0 invisible transition-all duration-200 group-hover:opacity-100 group-hover:visible
                group-focus-within:opacity-100 group-focus-within:visible">
                    Minimum 6 characters
                </span>
                <span class="text-error text-sm mt-1 block" id="passwordError" style="display: none;">Password must be at least 6 characters</span>
            </div>

            <!-- Confirm Password Field -->
            <div class="relative group">
                <input id="confirmPassword" name="confirmPassword" type="password" required
                    class="peer h-11 w-full border-b-2 border-slate-300 bg-transparent px-0 text-gray-900
                    placeholder-transparent focus:outline-none focus:border-primary
                    invalid:border-error valid:border-success transition-colors"
                    placeholder="Confirm Password" />
                <label for="confirmPassword"
                    class="absolute left-0 -top-1.5 text-secondary text-sm transition-all peer-placeholder-shown:top-3
                    peer-placeholder-shown:text-base peer-placeholder-shown:text-secondary peer-focus:-top-1.5
                    peer-focus:text-sm peer-focus:text-primary peer-valid:text-success peer-invalid:text-error">
                    Confirm Password
                </label>
                <span class="absolute right-0 top-2 z-10 rounded bg-gray-800 text-white px-2 py-1 text-xs
                opacity-0 invisible transition-all duration-200 group-hover:opacity-100 group-hover:visible
                group-focus-within:opacity-100 group-focus-within:visible">
                    Repeat your password
                </span>
                <span class="text-error text-sm mt-1 block" id="confirmError" style="display: none;">Passwords do not match</span>
            </div>

            <button type="submit"
                class="w-full rounded-md bg-primary px-4 py-2 text-white font-semibold hover:bg-blue-700
                focus:outline-none focus:ring-2 focus:ring-blue-300 transition-colors">
                Submit
            </button>
        </form>
    </div>

    <script>
        // Password Toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        let isPasswordVisible = false;

        togglePassword.addEventListener('click', () => {
            isPasswordVisible = !isPasswordVisible;
            passwordInput.type = isPasswordVisible ? 'text' : 'password';
            const icon = togglePassword.querySelector('i');
            icon.setAttribute('data-lucide', isPasswordVisible ? 'eye-off' : 'eye');
            lucide.createIcons();
        });

        // Form Validation
        const form = document.getElementById('advancedForm');
        const inputs = form.querySelectorAll('input');
        const errors = {
            name: document.getElementById('nameError'),
            email: document.getElementById('emailError'),
            password: document.getElementById('passwordError'),
            confirmPassword: document.getElementById('confirmError')
        };

        inputs.forEach(input => {
            input.addEventListener('blur', validateField);
            input.addEventListener('input', validateField);
        });

        function validateField(e) {
            const field = e.target;
            const fieldName = field.name;
            const errorElement = errors[fieldName];

            let isValid = true;
            let errorMessage = '';

            switch(fieldName) {
                case 'name':
                    if (!field.value.trim()) {
                        isValid = false;
                        errorMessage = 'Name is required';
                    }
                    break;
                case 'email':
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!field.value.trim()) {
                        isValid = false;
                        errorMessage = 'Email is required';
                    } else if (!emailRegex.test(field.value)) {
                        isValid = false;
                        errorMessage = 'Please enter a valid email';
                    }
                    break;
                case 'password':
                    if (!field.value) {
                        isValid = false;
                        errorMessage = 'Password is required';
                    } else if (field.value.length < 6) {
                        isValid = false;
                        errorMessage = 'Password must be at least 6 characters';
                    }
                    break;
                case 'confirmPassword':
                    const password = document.getElementById('password').value;
                    if (!field.value) {
                        isValid = false;
                        errorMessage = 'Please confirm your password';
                    } else if (field.value !== password) {
                        isValid = false;
                        errorMessage = 'Passwords do not match';
                    }
                    break;
            }

            if (!isValid) {
                errorElement.textContent = errorMessage;
                errorElement.style.display = 'block';
                field.classList.add('invalid');
                field.classList.remove('valid');
            } else {
                errorElement.style.display = 'none';
                field.classList.remove('invalid');
                field.classList.add('valid');
            }
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            let isFormValid = true;

            inputs.forEach(input => {
                validateField({ target: input });
                if (!input.checkValidity() || input.classList.contains('invalid')) {
                    isFormValid = false;
                }
            });

            if (isFormValid) {
                alert('Form submitted successfully!');
            }
        });

        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
