<!-- 2) დაამატე Tailwind config-ში custom borderRadius (მაგ. "xl2": "20px") და გამოიყენე 
 ეს მნიშვნელობა card-ზე და button-ზე, რომ დიზაინი გახდეს უფრო რბილი. -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    borderRadius: {
                        xl2: "20px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center">
    <div class="bg-white p-6 rounded-xl2 shadow-lg w-sm">
        <h2 class="text-xl font-bold mb-4 text-slate-800">Custom border radius</h2>
        <button class="w-full py-2 bg-red-500 rounded-xl2 font-bold text-white hover:bg-red-600 transition">
            Click
        </button>
    </div>
</html>
