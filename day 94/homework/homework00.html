<!-- 1) შექმენი ფორმა 2 სექციით (ლოგინი):
email
პაროლი
ფორმას დაუმატე ლამაზი დიზაინი (shadow, rounded, spacing). input-ებზე გააკეთე focus ეფექტები (focus:ring, focus:border) შენი custom ფერებით. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">
    <main class="w-full max-w-md p-8 bg-white shadow-2xl rounded-3xl">
        <h1 class="text-2xl font-bold text-center mb-6 text-slate-800">Login</h1>
        <form class="space-y-4">
            <div class="space-y-1">
                <label for="email" class="block text-sm font-medium text-slate-700">Email</label>
                <input id="email" type="email" required placeholder="you@example.com" 
                class="w-full px-4 py-2 rounded-xl border border-slate-300 focus:outline-none 
                focus:ring-2 focus:ring-violet-400 focus:border-violet-500 transition" />
            </div>
            <div class="space-y-1">
                <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                <input id="password" type="password" placeholder="••••••••" 
                class="w-full px-4 py-2 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 
                focus:ring-violet-400 focus:border-violet-500 transition" />
            </div>
            <button type="submit" class="w-full py-2.5 mt-2 bg-violet-600 text-white font-semibold 
            rounded-xl shadow hover:bg-violet-700 transition">Sign in</button>
        </form>
        <div class="mt-6 text-center text-xs text-slate-500">
            <p>Don't have an account? <a href="#" class="text-violet-600 hover:underline">Sign up</a></p>
        </div>
    </main>
</body>
</html>
