<!-- 8) შექმენი ბარათი (div.card) და ::before-ით ზედა კუთხეში დაამატე პატარა ლენტი (ribbon) წარწერით “SALE”. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            width: 100px;
            height: 100px;
            background-color: blue;
            position: relative;
        }
        .card::after{
            content: "SALE";
            display: block;
            position: absolute;
            top: 0;
            width: 100%;
            height: 5px;
            color: red;
            background-color: red;
        }
    </style>
</head>
<body>
    <div class="card"></div>
</body>
</html>
