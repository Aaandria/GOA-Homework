<!-- 7) შექმენი ტექსტი და ::after-ით დაამატე emoji 🎯 ტექსტის ბოლოს. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p::after{
            content: "🎯";
        }
    </style>
</head>
<body>
    <p>text</p>
</body>
</html>
