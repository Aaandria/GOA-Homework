<!-- 4) შექმენი სათაური (h2) და ::after-ით ქვემოთ გაუკეთე ხაზის იმიტაცია (underline), რეალური border-ის გარეშე. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h2{position: relative; display: inline;}
        h2::after{
            content: "";
            display: block;
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 1px;
            background-color: red;
        }
    </style>
</head>
<body>
    <h2>text</h2>
</body>
</html>
