<!-- 4) შექმენი p ელემენტი და ::after-ით დაამატე ბლოკი, რომლის მარცხენა დაშორება იქნება calc(50% - 25px). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            position: relative; 
        }
        p::after{
            content: "";
            display: block;
            position: absolute;
            bottom: 0;
            left: calc(50% - 25px);
            width: 50px;
            height: 50px;
            background-color: red;
        }
    </style>
</head>
<body>
    <p>text</p>
</body>
</html>
