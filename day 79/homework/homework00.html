<!-- 1) შექმენი div ბლოკი ფიქსირებული სიგანით და ::before-ის გამოყენებით დაამატე ხაზი, რომლის სიგანე იქნება calc(100% - 40px). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            position: relative;
            width: 200px;
            height: 100px;
            background-color: blue;
        }
        div::before{
            content: "";
            display: block;
            position: absolute;
            width: calc(100% - 40px);
            height: 10px;
            background-color: red;
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
