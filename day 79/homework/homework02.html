<!-- 3) შექმენი ღილაკი და ::before-ით დაამატე ფონი, რომელიც ღილაკზე 10px-ით პატარაა
(width: calc(100% - 20px), height: calc(100% - 20px)). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{position: relative; width: 100px; height: 100px;}
        button::before{
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: calc(100% - 20px);
            height: calc(100% - 20px);
            background-color: red;  
            display: block;
        }
    </style>
</head>
<body>
    <button>::before</button>
</body>
</html>
