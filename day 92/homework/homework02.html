<!-- 4) შექმენი checkbox ტექსტით "Subscribe to newsletter".
როდესაც checkbox მონიშნულია:
ტექსტი გახდეს ლურჯი
ტექსტი გახდეს bold
გამოიყენე peer-checked. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <label class="flex items-center space-x-2">
        <input type="checkbox" class="peer">
        <span class="peer-checked:text-blue-500 peer-checked:font-bold transition-colors duration-300">Subscribe to newsletter</span>
    </label>
</body>
</html>
