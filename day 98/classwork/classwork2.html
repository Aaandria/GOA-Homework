<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <!-- 4) შექმენი მარტივი Modal ფანჯარა TailwindCSS-ის გამოყენებით. თავიდან Modal იყოს დამალული (hidden კლასი). 
    დაამატე ღილაკი "Open Modal", რომელზე დაჭერისას Modal გამოჩნდება. გამოიყენე JavaScript (classList.remove / add).
    5) Modal-ს დაუმატე დახურვის ფუნქცია. შექმენი "Close" ღილაკი Modal-ის შიგნით, რომელზე დაჭერისას Modal 
    ისევ დაიმალება. გამოიყენე classList.add('hidden'). -->

    <p class="text-center text-xl font-bold">classwork 4 & 5</p>
    <div class="h-screen flex">
        <div class="m-auto">
            <button id="openModal" class="px-4 py-2 bg-blue-500 text-white rounded">Open Modal</button>
            <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
                <div class="bg-white rounded-lg p-6 relative w-96">
                    <h2 class="text-xl font-bold mb-4">Modal Title</h2>
                    <p class="mb-4">This is a simple modal. Click the close button to dismiss.</p>
                    <button id="closeModal" class="absolute top-2 right-2 text-gray
                    500 hover:text-gray-700">x</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const open = document.getElementById('openModal');
        const close = document.getElementById('closeModal');
        const modal = document.getElementById('modal');
        open.addEventListener('click', () => {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        });
        close.addEventListener('click', () => {
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        });
    </script>
</body>
</html>
